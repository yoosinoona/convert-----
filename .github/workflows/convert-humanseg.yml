name: Convert Seg Model to NCNN

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install onnx onnxsim
          pip install pnnx

      - name: Run conversion
        run: python tools/convert_humanseg.py

      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: humansegv2-ncnn
          path: output/*
